services:
  conduit:
    build: .
    ports:
      - "8000:8000"
    environment:
      AUTH_DISABLED: "true"
      DYNAMODB_TABLE: conduit-feeds
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_ENDPOINT_URL: http://dynamodb-local:8000
    volumes:
      - ./seeds/feeds.opml:/app/seeds/feeds.opml:ro
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully

  dynamodb-init:
    image: amazon/aws-cli:latest
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 > /dev/null 2>&1; do
          echo 'Waiting for DynamoDB Local...'; sleep 1;
        done
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name conduit-feeds \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
        || true
    depends_on:
      - dynamodb-local

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
