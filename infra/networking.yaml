AWSTemplateFormatVersion: "2010-09-09"
Description: Conduit - ALB, listener, target group, ACM certificate

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
  Domain:
    Type: String
    Description: Service domain (e.g. conduit-dev.conduitrss.com)
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone ID for the domain (looked up by Makefile)

Resources:
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref Domain
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref Domain
          HostedZoneId: !Ref HostedZoneId

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTPS inbound to ALB
      VpcId:
        Fn::ImportValue: !Sub "conduit-vpc-id-${Environment}"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "conduit-alb-${Environment}"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Split
        - ","
        - Fn::ImportValue: !Sub "conduit-public-subnet-ids-${Environment}"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "conduit-tg-${Environment}"
      Protocol: HTTP
      Port: 8000
      VpcId:
        Fn::ImportValue: !Sub "conduit-vpc-id-${Environment}"
      TargetType: ip
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

  # Route 53 alias record pointing the domain at the ALB
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref Domain
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        EvaluateTargetHealth: true
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

Outputs:
  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "conduit-alb-dns-${Environment}"
  AlbArn:
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub "conduit-alb-arn-${Environment}"
  TargetGroupArn:
    Value: !Ref TargetGroup
    Export:
      Name: !Sub "conduit-target-group-arn-${Environment}"
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "conduit-alb-sg-id-${Environment}"
